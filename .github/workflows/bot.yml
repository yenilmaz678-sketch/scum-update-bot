name: SCUM Efsane Bot

on:
  workflow_dispatch:
  schedule:
    - cron: "*/30 * * * *"

jobs:
  run:
    runs-on: ubuntu-latest

    steps:
      - name: Repo çek
        uses: actions/checkout@v4

      - name: Haber al
        run: |
          curl -s https://store.steampowered.com/feeds/news/app/513710/ > feed.xml

          BASLIK=$(grep -oP '<title>.*?</title>' feed.xml | sed -n '2p' | sed 's/<[^>]*>//g')
          LINK=$(grep -oP '<link>.*?</link>' feed.xml | sed -n '2p' | sed 's/<[^>]*>//g')

          echo "$BASLIK" > baslik.txt
          echo "$LINK" > link.txt

      - name: Önceki kontrol (spam engel)
        run: |
          if [ -f last.txt ]; then
            ESKI=$(cat last.txt)
          else
            ESKI=""
          fi

          YENI=$(cat baslik.txt)

          if [ "$ESKI" = "$YENI" ]; then
            echo "SEND=false" >> $GITHUB_ENV
          else
            echo "SEND=true" >> $GITHUB_ENV
          fi

      - name: İçerik çek
        if: env.SEND == 'true'
        run: |
          LINK=$(cat link.txt)
          curl -s "$LINK" > page.html

          grep -oP '<li>.*?</li>' page.html | sed 's/<[^>]*>//g' > raw.txt

      - name: Akıllı özet oluştur
        if: env.SEND == 'true'
        run: |
          BUG=$(grep -i "fix" raw.txt | head -n 3)
          PERF=$(grep -i "performance" raw.txt | head -n 2)
          CONTENT=$(grep -i "added\|new" raw.txt | head -n 3)

          echo "🔧 ÖZET:" > ozet.txt

          if [ ! -z "$CONTENT" ]; then
            echo "" >> ozet.txt
            echo "🆕 Yeni İçerikler:" >> ozet.txt
            echo "$CONTENT" | sed 's/^/• /' >> ozet.txt
          fi

          if [ ! -z "$BUG" ]; then
            echo "" >> ozet.txt
            echo "🐛 Düzeltmeler:" >> ozet.txt
            echo "$BUG" | sed 's/^/• /' >> ozet.txt
          fi

          if [ ! -z "$PERF" ]; then
            echo "" >> ozet.txt
            echo "⚡ Performans:" >> ozet.txt
            echo "$PERF" | sed 's/^/• /' >> ozet.txt
          fi

      - name: Discord gönder
        if: env.SEND == 'true'
        run: |
          BASLIK=$(cat baslik.txt)
          LINK=$(cat link.txt)
          OZET=$(cat ozet.txt)

          RESIM="https://cdn.cloudflare.steamstatic.com/steam/apps/513710/header.jpg"

          if echo "$BASLIK" | grep -Eiq "update|patch|v0"; then
            PING="@everyone"
          else
            PING=""
          fi

          PAYLOAD=$(printf '{
            "content":"%s",
            "embeds":[{
              "title":"📢 SCUM GÜNCELLEME",
              "description":"**%s**\n\n%s",
              "url":"%s",
              "color":16711680,
              "image":{"url":"%s"}
            }]
          }' "$PING" "$BASLIK" "$OZET" "$LINK" "$RESIM")

          curl -s -X POST -H "Content-Type: application/json" \
          -d "$PAYLOAD" \
          https://discord.com/api/webhooks/1499488095429726227/iL7B7POBmgpLHalVECNxyAUGcv90aX3LOw1gVyGB30kLOk8wHvShxyMPpRqVqRvEY1XR

      - name: Kaydet
        if: env.SEND == 'true'
        run: |
          mv baslik.txt last.txt

      - name: Commit
        if: env.SEND == 'true'
        run: |
          git config user.name "bot"
          git config user.email "bot@github.com"
          git add last.txt
          git commit -m "update" || echo "no change"
          git push
