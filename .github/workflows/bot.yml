name: SCUM Ultimate Fix Bot

on:
  workflow_dispatch:
  schedule:
    - cron: "*/30 * * * *"

jobs:
  run:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Haber al
        run: |
          curl -s https://store.steampowered.com/feeds/news/app/513710/ > feed.xml || true

          BASLIK=$(grep -oP '<title>.*?</title>' feed.xml 2>/dev/null | sed -n '2p' | sed 's/<[^>]*>//g')
          LINK=$(grep -oP '<link>.*?</link>' feed.xml 2>/dev/null | sed -n '2p' | sed 's/<[^>]*>//g')

          [ -z "$BASLIK" ] && BASLIK="Yeni SCUM güncellemesi"
          [ -z "$LINK" ] && LINK="https://store.steampowered.com/app/513710"

          echo "$BASLIK" > baslik.txt
          echo "$LINK" > link.txt

      - name: Spam kontrol
        run: |
          YENI=$(cat baslik.txt)
          ESKI=$(cat last.txt 2>/dev/null || echo "")

          if [ "$YENI" = "$ESKI" ]; then
            echo "SEND=false" >> $GITHUB_ENV
          else
            echo "SEND=true" >> $GITHUB_ENV
          fi

      - name: İçerik çek (hata korumalı)
        if: env.SEND == 'true'
        run: |
          LINK=$(cat link.txt)
          curl -s "$LINK" > page.html || true

          grep -oP '<li>.*?</li>' page.html 2>/dev/null | sed 's/<[^>]*>//g' > raw.txt || true

          # boşsa fallback
          if [ ! -s raw.txt ]; then
            echo "Yeni güncelleme yayınlandı." > raw.txt
          fi

      - name: Akıllı özet
        if: env.SEND == 'true'
        run: |
          BUG=$(grep -i "fix" raw.txt 2>/dev/null | head -n 3)
          PERF=$(grep -i "performance" raw.txt 2>/dev/null | head -n 2)
          CONTENT=$(grep -iE "added|new" raw.txt 2>/dev/null | head -n 3)

          echo "🔧 ÖZET:" > ozet.txt

          if [ ! -z "$CONTENT" ]; then
            echo "" >> ozet.txt
            echo "🆕 Yeni:" >> ozet.txt
            echo "$CONTENT" | sed 's/^/• /' >> ozet.txt
          fi

          if [ ! -z "$BUG" ]; then
            echo "" >> ozet.txt
            echo "🐛 Fix:" >> ozet.txt
            echo "$BUG" | sed 's/^/• /' >> ozet.txt
          fi

          if [ ! -z "$PERF" ]; then
            echo "" >> ozet.txt
            echo "⚡ Performans:" >> ozet.txt
            echo "$PERF" | sed 's/^/• /' >> ozet.txt
          fi

      - name: Discord gönder
        if: env.SEND == 'true'
        run: |
          BASLIK=$(cat baslik.txt)
          LINK=$(cat link.txt)
          OZET=$(cat ozet.txt)

          RESIM="https://cdn.cloudflare.steamstatic.com/steam/apps/513710/header.jpg"

          PAYLOAD=$(printf '{
            "embeds":[{
              "title":"📢 SCUM UPDATE",
              "description":"**%s**\n\n%s",
              "url":"%s",
              "color":16711680,
              "image":{"url":"%s"}
            }]
          }' "$BASLIK" "$OZET" "$LINK" "$RESIM")

          curl -s -X POST -H "Content-Type: application/json" \
          -d "$PAYLOAD" \
          https://discord.com/api/webhooks/1499488095429726227/iL7B7POBmgpLHalVECNxyAUGcv90aX3LOw1gVyGB30kLOk8wHvShxyMPpRqVqRvEY1XR

      - name: Kaydet
        if: env.SEND == 'true'
        run: |
          cp baslik.txt last.txt

      - name: Push
        if: env.SEND == 'true'
        run: |
          git config user.name "bot"
          git config user.email "bot@bot.com"
          git add last.txt
          git commit -m "update" || true
          git push || true
